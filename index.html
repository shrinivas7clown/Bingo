<!DOCTYPE html>
<html>
<head>
  <title>Bingo Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🎮 Bingo Game</h1>

  <input id="name" placeholder="Your Name">
  <input id="room" placeholder="Room ID">

  <button onclick="joinRoom()">Join Room</button>

  <!-- LOBBY -->
  <div id="lobby" style="display:none;">
    <h3>Players:</h3>
    <ul id="players"></ul>

    <button id="startBtn" onclick="startGame()" style="display:none;">
      Start Game
    </button>

    <h3 id="status">Waiting for players...</h3>
  </div>

  <!-- GAME -->
  <div id="game" class="hidden">

    <div class="layout">

      <!-- LEFT: MUSIC -->
      <div id="music">
        <h3>🎵 Music</h3>

        <ul id="songList"></ul>

        <div>
          <button onclick="playSong()">▶</button>
          <button onclick="pauseSong()">⏸</button>
          <button onclick="nextSong()">⏭</button>
        </div>
      </div>

      <!-- RIGHT: GAME + CHAT -->
      <div id="rightSide">

        <!-- GAME -->
        <div id="gameArea">
          <h2 id="turnText">Waiting...</h2>
          <h2 id="number">---</h2>

          <div id="board"></div>

          <button id="myBtn" onclick="sendNumber()" disabled>My Number</button>
          <button onclick="checkBingo()">BINGO</button>

          <h2 id="winner"></h2>
        </div>

        <!-- CHAT -->
        <div id="chatBox">
          <h3>💬 Chat</h3>

          <div id="messages"></div>

          <div id="chatInput">
            <input id="msgInput" placeholder="Type message..." />
            <button onclick="sendMessage()">Send</button>
          </div>
        </div>

      </div>

    </div>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
